---
- name: Provision Ubuntu 24.04 server
  hosts: all
  become: true
  gather_facts: true

  vars:
    target_user: "{{ ansible_user | default('ubuntu') }}"
    base_packages:
      - ca-certificates
      - curl
      - wget
      - gnupg
      - lsb-release
      - software-properties-common
      - apt-transport-https
      - unzip
      - tar
      - git
      - ufw
      - build-essential
      - gcc
      - g++
      - make
      - cmake
      - pkg-config
      - jq
      - cron
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    php_packages:
      - php
      - php-fpm
      - php-cli
      - php-common
      - php-mysql
      - php-curl
      - php-xml
      - php-mbstring
      - php-zip
      - php-gd
      - php-intl
      - php-bcmath
      - php-soap
      - php-imagick
      - php-opcache
      - php-readline
      - php-xmlrpc
      - php-imap

  pre_tasks:
    - name: Fail if distribution is not Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
        fail_msg: "This playbook is intended for Ubuntu hosts only."

    - name: Warn when Ubuntu version is not 24.04
      ansible.builtin.debug:
        msg: "WARNING: This playbook is designed for Ubuntu 24.04 (detected {{ ansible_distribution_version }})."
      when: ansible_distribution_version != "24.04"

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Get home directory for target user
      ansible.builtin.command: getent passwd "{{ target_user }}"
      register: target_user_passwd
      changed_when: false

    - name: Set target home fact
      ansible.builtin.set_fact:
        target_home: "{{ target_user_passwd.stdout.split(':')[5] }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Upgrade installed packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true

    - name: Install base dependencies
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: latest

    # ----------------------------------------------------------------------
    # NGINX (official nginx.org repository)
    # ----------------------------------------------------------------------
    - name: Download nginx signing key
      ansible.builtin.get_url:
        url: https://nginx.org/keys/nginx_signing.key
        dest: /tmp/nginx_signing.key
        mode: "0644"

    - name: Convert nginx key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/nginx-archive-keyring.gpg /tmp/nginx_signing.key
      args:
        creates: /etc/apt/keyrings/nginx-archive-keyring.gpg

    - name: Configure nginx apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nginx-archive-keyring.gpg] http://nginx.org/packages/ubuntu {{ ansible_distribution_release }} nginx"
        filename: nginx
        state: present

    - name: Prefer nginx.org packages
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/99-nginx
        mode: "0644"
        content: |
          Package: nginx*
          Pin: origin nginx.org
          Pin-Priority: 900

    - name: Install latest stable nginx
      ansible.builtin.apt:
        name: nginx
        state: latest
        update_cache: true

    - name: Enable and start nginx service
      ansible.builtin.service:
        name: nginx
        enabled: true
        state: started

    # ----------------------------------------------------------------------
    # Docker (official Docker CE repository)
    # ----------------------------------------------------------------------
    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker.asc
        mode: "0644"

    - name: Convert Docker key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine, CLI, Buildx and Compose plugin
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: latest
        update_cache: true

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add target user to docker group
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true
      when: target_user != "root"

    - name: Verify Docker daemon using hello-world image
      ansible.builtin.command: docker run --rm hello-world
      changed_when: false

    - name: Verify Docker Compose plugin is available
      ansible.builtin.command: docker compose version
      changed_when: false

    # ----------------------------------------------------------------------
    # PHP 8.x for WordPress (ondrej/php PPA)
    # ----------------------------------------------------------------------
    - name: Add ondrej/php PPA
      ansible.builtin.apt_repository:
        repo: ppa:ondrej/php
        state: present

    - name: Install PHP and common WordPress extensions
      ansible.builtin.apt:
        name: "{{ php_packages }}"
        state: latest
        update_cache: true

    - name: Detect installed PHP version
      ansible.builtin.command: php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;'
      register: php_version_short
      changed_when: false

    - name: Enable and start PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version_short.stdout }}-fpm"
        enabled: true
        state: started

    # ----------------------------------------------------------------------
    # Node.js LTS + npm (official NodeSource setup script)
    # ----------------------------------------------------------------------
    - name: Check NodeSource list file
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/nodesource.list
      register: nodesource_list

    - name: Configure NodeSource repository for latest LTS
      ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
      args:
        executable: /bin/bash
      when: not nodesource_list.stat.exists

    - name: Install Node.js and npm
      ansible.builtin.apt:
        name: nodejs
        state: latest
        update_cache: true

    - name: Verify Node.js is installed
      ansible.builtin.command: node -v
      register: node_version
      changed_when: false

    - name: Verify npm is installed
      ansible.builtin.command: npm -v
      register: npm_version
      changed_when: false

    # ----------------------------------------------------------------------
    # PM2
    # ----------------------------------------------------------------------
    - name: Install latest PM2 globally
      ansible.builtin.npm:
        name: pm2
        global: true
        state: latest

    - name: Configure PM2 startup with systemd
      ansible.builtin.command: pm2 startup systemd -u "{{ target_user }}" --hp "{{ target_home }}"
      register: pm2_startup
      changed_when: "'already' not in ((pm2_startup.stdout + pm2_startup.stderr) | lower)"
      failed_when: pm2_startup.rc != 0 and "'already' not in ((pm2_startup.stdout + pm2_startup.stderr) | lower)"

    - name: Save PM2 process list for target user
      ansible.builtin.command: pm2 save --force
      become_user: "{{ target_user }}"
      environment:
        PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      changed_when: false

    # ----------------------------------------------------------------------
    # Git credential storage
    # ----------------------------------------------------------------------
    - name: Configure git credential storage for target user
      ansible.builtin.command: git config --global credential.helper store
      become_user: "{{ target_user }}"
      changed_when: false

    - name: Configure git credential storage for root
      ansible.builtin.command: git config --global credential.helper store
      changed_when: false

    # ----------------------------------------------------------------------
    # UFW firewall
    # ----------------------------------------------------------------------
    - name: Set UFW defaults (deny incoming)
      ansible.builtin.command: ufw default deny incoming
      register: ufw_default_in
      changed_when: "'Skipping' not in ufw_default_in.stdout"

    - name: Set UFW defaults (allow outgoing)
      ansible.builtin.command: ufw default allow outgoing
      register: ufw_default_out
      changed_when: "'Skipping' not in ufw_default_out.stdout"

    - name: Allow OpenSSH
      ansible.builtin.command: ufw allow OpenSSH
      register: ufw_allow_ssh
      changed_when: "'Skipping adding existing rule' not in ufw_allow_ssh.stdout"

    - name: Allow Nginx full profile
      ansible.builtin.command: ufw allow 'Nginx Full'
      register: ufw_allow_nginx
      changed_when: "'Skipping adding existing rule' not in ufw_allow_nginx.stdout"

    - name: Enable UFW non-interactively
      ansible.builtin.command: ufw --force enable
      register: ufw_enable
      changed_when: "'already' not in (ufw_enable.stdout | lower)"

    # ----------------------------------------------------------------------
    # Final verification
    # ----------------------------------------------------------------------
    - name: Verify nginx service is active
      ansible.builtin.command: systemctl is-active nginx
      register: nginx_status
      changed_when: false
      failed_when: nginx_status.stdout.strip() != "active"

    - name: Verify docker service is active
      ansible.builtin.command: systemctl is-active docker
      register: docker_status
      changed_when: false
      failed_when: docker_status.stdout.strip() != "active"

    - name: Verify PHP-FPM service is active
      ansible.builtin.command: systemctl is-active "php{{ php_version_short.stdout }}-fpm"
      register: php_fpm_status
      changed_when: false
      failed_when: php_fpm_status.stdout.strip() != "active"

    - name: Verify UFW is enabled
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false
      failed_when: "'Status: active' not in ufw_status.stdout"

    - name: Collect Nginx version
      ansible.builtin.command: nginx -v
      register: nginx_version
      changed_when: false

    - name: Collect Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Collect Docker Compose version
      ansible.builtin.command: docker compose version
      register: docker_compose_version
      changed_when: false

    - name: Collect PHP version
      ansible.builtin.command: php -v
      register: php_version_full
      changed_when: false

    - name: Collect PM2 version
      ansible.builtin.command: pm2 -v
      register: pm2_version
      changed_when: false

    - name: Collect Git version
      ansible.builtin.command: git --version
      register: git_version
      changed_when: false

    - name: Print installation summary
      ansible.builtin.debug:
        msg:
          - "Nginx: {{ nginx_version.stderr | default(nginx_version.stdout) }}"
          - "Docker: {{ docker_version.stdout }}"
          - "Docker Compose: {{ docker_compose_version.stdout }}"
          - "PHP: {{ php_version_full.stdout_lines[0] }}"
          - "Node.js: {{ node_version.stdout }}"
          - "npm: {{ npm_version.stdout }}"
          - "PM2: {{ pm2_version.stdout }}"
          - "Git: {{ git_version.stdout }}"
